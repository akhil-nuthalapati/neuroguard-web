services:
  - type: web
    name: neuroguard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: EAR_THRESHOLD
        value: "0.25"
      - key: MAR_THRESHOLD
        value: "0.7"
